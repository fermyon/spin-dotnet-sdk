files = [{ source = "Fermyon.PetStore.Pet/assets", destination = "/assets" }]
allowed_http_hosts = ["localhost:3000"]
allowed_outbound_hosts = ["localhost:5432"]
[component.pet.variables]
pg_conn_str = "{{ pg_conn_str }}"
[component.pet.build]
